<!DOCTYPE html>
<html lang="en">
<head>
    <title>Messages</title>
    <meta charset="utf-8"/>
</head>
<body>
    <h1>Add a message:</h1>
    <form action="add" method="post">
        <textarea name="content" rows="5" cols="60"></textarea>
        <br/>
        <input type="submit" value="Submit"/>
    </form>
    <h1>Last 13 messages:</h1>
    <ol>
        {% for message in messages %}
            <li>{{ message }}</li>
        {% endfor %}
    </ol>
</body>
</html>
