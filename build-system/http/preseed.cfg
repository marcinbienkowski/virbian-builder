# Locale
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i locales/locales_to_be_generated multiselect en_US.UTF-8 UTF-8, en_GB.UTF-8 UTF-8, pl_PL.UTF-8 UTF-8
d-i time/zone string Europe/Warsaw


# Accounts and hostname
d-i passwd/root-login boolean false
d-i passwd/user-fullname string user
d-i passwd/username string user
d-i passwd/user-password password user
d-i passwd/user-password-again password user


# Partitioning (GPT, ESP, swap, and root)
# Swap seems to be required for EFI builds.
d-i partman-auto/method string regular
d-i partman-auto/choose_recipe select efi-root
d-i partman-partitioning/confirm_write_new_label boolean true
d-i partman/choose_partition select finish
d-i partman/confirm boolean true
d-i partman/confirm_nooverwrite boolean true
d-i partman-auto/disk string /dev/sda
d-i partman-auto/expert_recipe string \
    efi-root :: \
        512 512 512 fat32 $iflabel{ gpt } $reusemethod{ } method{ efi } format{ } . \
        512 512 512 linux-swap method{ swap } format{ } . \
        5000 10000 -1 ext4 $primary{ } method{ format } format{ } use_filesystem{ } filesystem{ ext4 } mountpoint{ / } .


# SSH server and sudo
d-i pkgsel/run_tasksel boolean false
d-i pkgsel/include string openssh-server sudo
d-i pkgsel/upgrade select none
popularity-contest popularity-contest/participate boolean false


# Adding sudo + setting domainname (netcfg/*domain is ignored)
d-i preseed/late_command string \
    in-target sh -c 'echo "user ALL=(ALL) NOPASSWD:ALL" > /etc/sudoers.d/user'; \
    in-target sed -i 's/^127\.0\.1\.1.*/127.0.1.1\tvirbian.local\tvirbian/' /etc/hosts
d-i finish-install/reboot_in_progress note
